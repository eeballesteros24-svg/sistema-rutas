<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<title>Sistema de Rutas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0f1e; --surf:#111827; --blue:#3b82f6; --text:#f0f4ff; --muted:#64748b; --green:#10b981; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
  .page { display: none; padding: 20px; max-width: 480px; margin: auto; animation: fadeIn 0.3s ease; }
  .active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .card { background: var(--surf); padding: 22px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #2d3748; background: #1a2235; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
  input:focus { border-color: var(--blue); }
  
  .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:active { transform: scale(0.98); opacity: 0.9; }
  
  nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(7,11,20,0.95); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #2d3748; z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .nav-btn.active { color: var(--blue); }
  
  /* Sistema Admin Invisible */
  .admin-only { display: none !important; }
  body.modo-admin .admin-only { display: flex !important; }
  
  .status-bar { font-size: 12px; text-align: center; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5568; }
  .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
</style>
</head>
<body>

<div id="p-login" class="page active">
  <div style="text-align:center; padding: 40px 0 20px;">
    <h1 style="margin:0; font-size: 28px; letter-spacing: -1px;">Sistema de Rutas</h1>
    <div class="status-bar">
      <div id="indicador" class="dot"></div>
      <span id="msg-sync" style="color: var(--muted)">Cargando base de datos...</span>
    </div>
  </div>
  
  <div class="card">
    <label style="font-size: 14px; color: var(--muted); font-weight: 500;">Documento de Identidad</label>
    <input type="number" id="cedulaInp" placeholder="Ingresa tu cédula
