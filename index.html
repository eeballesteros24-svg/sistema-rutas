<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<title>Sistema de Rutas - Yuli Jiménez</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0f1e; --surface:#111827; --blue:#3b82f6; --text:#f0f4ff; --muted:#64748b;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
  .page { display: none; padding: 20px; max-width: 500px; margin: auto; }
  .active { display: block; }
  .card { background: var(--surface); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
  input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a2235; color: white; box-sizing: border-box; }
  .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
  .btn-primary { background: var(--blue); color: white; }
  
  /* BARRA DE NAVEGACIÓN */
  nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #070b14; display: flex; border-top: 1px solid #333; }
  .nav-btn { flex: 1; background: none; border: none; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; }
  .nav-btn.active { color: var(--blue); }

  /* ESTO ES LO QUE PIDES: OCULTAR ADMIN POR DEFECTO */
  .admin-only { display: none !important; }
  body.modo-admin .admin-only { display: flex !important; }
</style>
</head>
<body id="cuerpo">

<div id="p-registro" class="page active">
  <div style="text-align:center; padding: 20px 0;">
    <h2>Solicitud de Ruta</h2>
    <p id="status" style="color: gray; font-size: 12px;">Conectando a Google Sheets...</p>
  </div>
  <div class="card">
    <label>Cédula del Empleado</label>
    <input type="number" id="cedulaInput" placeholder="Ej: 1098765432">
    <button class="btn btn-primary" onclick="validarUsuario()">Siguiente</button>
  </div>
</div>

<div id="p-admin" class="page">
  <h2>Panel de Control</h2>
  <div class="card">
    <p>Aquí verás el resumen de rutas una vez sincronices.</p>
    <button class="btn btn-primary" onclick="alert('Exportando a Excel...')">Descargar Reporte</button>
  </div>
</div>

<nav>
  <button class="nav-btn active" onclick="cambiarPagina('p-registro')"><span>Solicitar</span></button>
  <button class="nav-btn admin-only" id="btnAdmin" onclick="cambiarPagina('p-admin')"><span>Admin</span></button>
</nav>

<script>
const MI_LINK_GOOGLE = "https://script.google.com/macros/s/AKfycbxoXz90TwdMp-oU1sr2h8CzahsSzhR8-6ME18EBz2l26tYbSYNG_cR5kZfmiQwxNcLB/exec";
let baseDeDatos = [];

// 1. CARGAR DATOS DE GOOGLE AL ABRIR
async function cargarDatos() {
  try {
    const res = await fetch(MI_LINK_GOOGLE, { redirect: 'follow' });
    baseDeDatos = await res.json();
    document.getElementById('status').innerText = "✅ Sistema Listo";
  } catch (e) {
    document.getElementById('status').innerText = "❌ Error de conexión";
  }
}

// 2. VALIDAR SI ES ADMIN POR EL LINK
function chequearAdmin() {
  const parametros = new URLSearchParams(window.location.search);
  if (parametros.get('admin') === '1') {
    document.body.classList.add('modo-admin');
    console.log("Acceso de administrador concedido");
  }
}

function validarUsuario() {
  const ced = document.getElementById('cedulaInput').value;
  const user = baseDeDatos.find(u => String(u.cedula) === String(ced));
  if(user) {
    alert("Bienvenido " + user.nombre);
    // Aquí iría el siguiente paso del formulario
  } else {
    alert("Cédula no encontrada");
  }
}

function cambiarPagina(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.onload = () => {
  cargarDatos();
  chequearAdmin();
};
</script>
</body>
</html>
