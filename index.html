<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sistema de Rutas</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f4ff;--muted:#64748b;--muted2:#94a3b8;
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);--blue-dim2:rgba(59,130,246,0.22);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);--amber-dim2:rgba(245,158,11,0.22);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);--green-dim2:rgba(16,185,129,0.22);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --teal:#06b6d4;--teal-dim:rgba(6,182,212,0.12);
  --radius:14px;--radius-sm:9px;--nav-h:68px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

/* --- CLASES NUEVAS PARA CONTROL DE USUARIO --- */
.admin-only { display: none !important; }
body.is-admin .admin-only { display: flex !important; }
/* --------------------------------------------- */

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,15,30,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border2);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;transition:color 0.2s;padding-bottom:4px;position:relative}
.nav-btn svg{width:22px;height:22px}
.nav-btn.active{color:var(--blue)}
.nav-btn.active svg{filter:drop-shadow(0 0 6px rgba(59,130,246,0.5))}
.nav-dot{position:absolute;top:8px;right:calc(50% - 14px);width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg);display:none}
.nav-dot.on{display:block}
/* PAGES */
.page{display:none;padding:20px 16px calc(var(--nav-h)+16px);max-width:480px;margin:0 auto}
.page.active{display:block}
/* TOPBAR */
.topbar{text-align:center;padding:20px 0 16px}
.app-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#1d4ed8,#6366f1);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 28px rgba(99,102,241,0.3)}
.app-icon svg{width:30px;height:30px;color:#fff}
.topbar h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
.topbar p{color:var(--muted2);font-size:13px;margin-top:4px}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:14px}
.section-title{font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:10px;margin-top:16px;text-transform:uppercase;letter-spacing:0.06em}
/* INPUTS */
label{display:block;font-size:12px;font-weight:500;color:var(--muted2);margin-bottom:6px}
input[type="text"],input[type="date"],input[type="password"],select{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--blue)}
input[readonly]{color:var(--muted2)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer}
select option{background:var(--surface2)}
.form-row{margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* BUTTONS */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;text-align:center}
.btn:active{transform:scale(0.97)}
.btn+.btn{margin-top:8px}
.btn-primary{background:var(--blue);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2)}
.btn-amber{background:var(--amber);color:#fff}
.btn-sm{display:inline-block;width:auto;padding:6px 12px;font-size:12px;font-weight:600;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn-sm:active{transform:scale(0.95)}
/* TYPE SELECTOR */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-btn{padding:16px 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center}
.type-btn .icon{font-size:20px;display:block;margin-bottom:4px}
.type-btn.sel-ingreso{background:var(--blue-dim2);border-color:var(--blue);color:var(--blue)}
.type-btn.sel-salida{background:var(--amber-dim2);border-color:var(--amber);color:var(--amber)}
/* PERSONA / AVATAR */
.persona-card{background:var(--blue-dim);border:1px solid var(--blue-dim2);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#1d4ed8,#6366f1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff}
.avatar-lg{width:68px;height:68px;font-size:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#1d4ed8,#6366f1);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
.persona-info h3{font-size:15px;font-weight:600}
.persona-info p{font-size:12px;color:var(--muted2);margin-top:2px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-blue{background:var(--blue-dim);color:var(--blue)}
.badge-amber{background:var(--amber-dim);color:var(--amber)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:var(--red-dim);color:var(--red)}
.badge-gray{background:rgba(255,255,255,0.07);color:var(--muted2)}
.badge-teal{background:var(--teal-dim);color:var(--teal)}
/* RUTA CARD */
.ruta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ruta-hora{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.ruta-hora.ingreso{color:var(--blue)}
.ruta-hora.salida{color:var(--amber)}
.ruta-fecha-real{font-size:11px;color:var(--muted2);font-family:'Space Mono',monospace;margin-top:1px}
.ruta-meta{font-size:12px;color:var(--muted);margin-top:2px}
.ruta-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
/* RESULT */
.result-box{text-align:center;padding:24px 12px}
.result-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.result-icon.ok{background:var(--green-dim)}
.result-icon.err{background:var(--red-dim)}
.result-icon.warn{background:var(--amber-dim)}
.result-icon svg{width:28px;height:28px}
.result-icon.ok svg{color:var(--green)}
.result-icon.err svg{color:var(--red)}
.result-icon.warn svg{color:var(--amber)}
.result-box h2{font-size:20px;font-weight:600;margin-bottom:6px}
.result-box p{color:var(--muted2);font-size:14px;margin-bottom:14px}
.result-detail{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-family:'Space Mono',monospace;font-size:13px;text-align:left;line-height:1.9}
/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:700;font-family:'Space Mono',monospace}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--surface2);position:sticky;top:0;z-index:1}
th{padding:10px 8px;text-align:left;font-weight:600;color:var(--muted2);white-space:nowrap}
td{padding:8px;border-top:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(255,255,255,0.02)}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none}
.search-wrap input{padding-left:36px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;padding:12px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
/* PIN */
.pin-display{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.2s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{padding:18px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:18px;font-weight:600;color:var(--text);cursor:pointer;text-align:center;transition:all 0.1s;font-family:'Space Mono',monospace}
.pin-key:active{background:var(--blue-dim2);border-color:var(--blue);transform:scale(0.93)}
.pin-key.del{font-size:13px;color:var(--muted2)}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;margin-bottom:14px}
.tab{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);transition:all 0.2s}
.tab.active{background:var(--surface);color:var(--text)}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(10px);background:#1e2d42;border:1px solid var(--border2);border-radius:99px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav>
  <button class="nav-btn active" data-screen="registrar" onclick="showPage('registrar')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Solicitar
  </button>
  <button class="nav-btn" data-screen="misrutas" onclick="showPage('misrutas')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Mis Rutas
  </button>
  <button class="nav-btn" data-screen="perfil" onclick="showPage('perfil')">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    Mi Perfil
  </button>
  <button class="nav-btn admin-only" data-screen="admin" onclick="initAdmin()">
    <span class="nav-dot" id="admin-dot"></span>
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Admin
  </button>
</nav>

<div id="page-registrar" class="page active">
  <div id="step-buscar" class="fade">
    <div class="topbar">
      <div class="app-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </div>
      <h1>Sistema de Rutas</h1>
      <p>Solicita tu ruta de transporte</p>
    </div>
    <div class="card">
      <div class="form-row">
        <label>Número de cédula</label>
        <input type="text" id="inp-cedula" placeholder="Ej: 1098765432" inputmode="numeric" maxlength="12" onkeydown="if(event.key==='Enter')buscarPersonal()">
      </div>
      <button class="btn btn-primary" onclick="buscarPersonal()">Buscar →</button>
    </div>
  </div>
  </div>

<script>
// --- TU BASE DE DATOS ACTUAL ---
let db = { personal: [], rutas: [], config: { pin: '1234' } };

function save() { localStorage.setItem('srutas_db', JSON.stringify(db)); }
function load() { 
  const d = localStorage.getItem('srutas_db'); 
  if(d) db = JSON.parse(d); 
}

// ════════════════════════════════════════
//  NUEVA FUNCIÓN: SINCRONIZAR CON GOOGLE
// ════════════════════════════════════════
async function sincronizarConNube() {
  // REEMPLAZA ESTA URL CON LA QUE TE DIO GOOGLE APPS SCRIPT
  const URL_API = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI"; 
  
  try {
    const response = await fetch(URL_API);
    const datosNuevos = await response.json();
    
    if (datosNuevos && datosNuevos.length > 0) {
      db.personal = datosNuevos;
      save();
      console.log("Personal sincronizado desde la nube");
    }
  } catch (error) {
    console.warn("Usando datos locales (offline)");
  }
}

// ════════════════════════════════════════
//  INICIO DE LA APP
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // 1. Cargamos datos locales
  load();
  
  // 2. Intentamos traer datos nuevos sin interrumpir al usuario
  sincronizarConNube();

  // 3. Verificamos si es Admin mediante la URL (?admin=1)
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === '1') {
    document.body.classList.add('is-admin');
  }

  // 4. Inicializar resto de la App
  // (Aquí van tus funciones originales: poblarSelects, etc.)
});

// --- EL RESTO DE TUS FUNCIONES ORIGINALES SIGUEN AQUÍ IGUAL ---
// buscarPersonal(), guardarRuta(), showPage(), etc.

</script>
</body>
</html>
